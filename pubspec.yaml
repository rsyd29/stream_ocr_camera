name: stream_ocr_camera
description: >
  A Flutter package for real-time ANPR (Automatic Number Plate Recognition)
  of Indonesian license plates using on-device ML Kit OCR from live camera stream.
version: 0.1.0

environment:
  sdk: ^3.5.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.4
  google_mlkit_text_recognition: ^0.15.1
  permission_handler: ^12.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
